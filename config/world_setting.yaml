      name: "猎人阿洛"
      location: "forest"
      status: "alive"
      friendly_to_player: 35

  items:
    - id: "sword"
      name: "锈剑"
      location: "cave"
      holder: null
    - id: "torch"
      name: "火把"
      location: "village"
      holder: null

rules:
  hard_constraints:
    - "dead_character_cannot_speak"
    - "item_not_held_cannot_be_used"
    - "location_not_connected_cannot_travel"
