world:
  setting: "medieval_fantasy"
  locations:
    - id: "village"
      name: "青石村"
      danger_level: 0
      connections: ["forest", "cave"]
    - id: "forest"
      name: "迷雾森林"
      danger_level: 2
      connections: ["village", "cave"]
    - id: "cave"
      name: "禁忌洞穴"
      danger_level: 3
